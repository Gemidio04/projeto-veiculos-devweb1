<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoPonto - Anúncios de Veículos</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- ===================== CABEÇALHO ===================== -->
    <header class="topo">
        <div class="logo">
            <img src="assets/logo.svg" alt="Logotipo AutoPonto">
            <h1>AutoPonto</h1>
        </div>
    </header>

    <!-- ===================== NAVEGAÇÃO ===================== -->
    <nav class="menu">
        <ul>
            <li><a href="index.html">Início</a></li>
            <li><a href="login.html">Login</a></li>
            <li><a href="cadastro.html">Cadastre-se</a></li>
        </ul>
    </nav>

    <!-- ===================== CONTEÚDO PRINCIPAL ===================== -->
    <main>

        <!-- Painel de busca: os selects agora são preenchidos dinamicamente
             pelo JavaScript (js/busca.js) com base nos dados carregados -->
        <section class="painel-busca" aria-label="Painel de busca de veículos">
            <div class="campo">
                <label for="marca">Marca</label>
                <select id="marca" name="marca">
                    <option value="">Todas</option>
                </select>
            </div>

            <div class="campo">
                <label for="modelo">Modelo</label>
                <select id="modelo" name="modelo">
                    <option value="">Todos</option>
                </select>
            </div>

            <div class="campo">
                <label for="cidade">Localização</label>
                <select id="cidade" name="cidade">
                    <option value="">Todas</option>
                </select>
            </div>

            <button type="button" id="btn-buscar">Buscar</button>
        </section>

        <!-- Listagem de anúncios em cards: preenchida dinamicamente por js/busca.js -->
        <section class="lista-anuncios" aria-label="Lista de anúncios">
            <h2 style="width: 100%; margin-bottom: -0.5rem;">Últimos anúncios</h2>

            <div id="container-cards" style="display: contents;">
                <!-- Cards inseridos aqui via JavaScript -->
            </div>

            <p id="mensagem-vazio" style="display: none; width: 100%;">
                Nenhum anúncio encontrado com os filtros selecionados.
            </p>
        </section>
    </main>

    <!-- ===================== RODAPÉ ===================== -->
    <footer class="rodape">
        <p>&copy; 2026 AutoPonto - Projeto acadêmico UFU - Desenvolvimento Web I</p>
    </footer>

    <!-- ===================== SCRIPTS ===================== -->
    <script>const CAMINHO_BASE = '';</script>
    <script src="js/storage.js"></script>
    <script src="js/busca.js"></script>

</body>
</html>
