<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AutoPonto</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header class="topo">
        <div class="logo">
            <img src="assets/logo.svg" alt="Logotipo AutoPonto">
            <h1>AutoPonto</h1>
        </div>
    </header>

    <nav class="menu">
        <ul class="lista-menu">
            <li class="item-menu"><a href="index.html">Início</a></li>
            <li class="item-menu"><a href="login.html">Login</a></li>
            <li class="item-menu"><a href="cadastro.html">Cadastre-se</a></li>
        </ul>
    </nav>

    <main>
        <!-- Nesta etapa o formulário não tem funcionalidade real (sem JS/back-end ainda) -->
        <form class="formulario" action="#" method="post">
            <h2>Entrar</h2>

            <div class="campo">
                <label for="email">E-mail</label>
                <input type="email" id="email" name="email" placeholder="seuemail@exemplo.com" required>
            </div>

            <div class="campo">
                <label for="senha">Senha</label>
                <input type="password" id="senha" name="senha" placeholder="Digite sua senha" required>
            </div>

            <button type="submit">Entrar</button>

            <p class="link-alt">Ainda não tem conta? <a href="cadastro.html">Cadastre-se aqui</a></p>
        </form>
    </main>

    <footer class="rodape">
        <p>&copy; 2026 AutoPonto - Projeto acadêmico UFU - Desenvolvimento Web I</p>
    </footer>

</body>
</html>
