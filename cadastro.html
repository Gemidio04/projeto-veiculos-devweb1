<!--
    CADASTRO.HTML
    Página pública de cadastro de novo usuário/anunciante.
    Campos: nome, CPF, e-mail, senha e telefone (conforme especificação).
    Formulário ainda sem funcionalidade real (sem JS/back-end) - isso
    será implementado nas próximas etapas do projeto.
-->
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - AutoPonto</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header class="topo">
        <div class="logo">
            <img src="assets/logo.svg" alt="Logotipo AutoPonto">
            <h1>AutoPonto</h1>
        </div>
    </header>

    <nav class="menu">
        <ul>
            <li><a href="index.html">Início</a></li>
            <li><a href="login.html">Login</a></li>
            <li><a href="cadastro.html">Cadastre-se</a></li>
        </ul>
    </nav>

    <main>
        <!-- Campos exatamente conforme especificado: nome, CPF, e-mail, senha, telefone -->
        <form class="formulario" id="form-cadastro" action="#" method="post">
            <h2>Criar conta de anunciante</h2>

            <div id="mensagem-envio"></div>

            <div class="campo">
                <label for="nome">Nome completo</label>
                <input type="text" id="nome" name="nome" required>
            </div>

            <div class="campo">
                <label for="cpf">CPF</label>
                <input type="text" id="cpf" name="cpf" placeholder="000.000.000-00" required>
            </div>

            <div class="campo">
                <label for="email">E-mail</label>
                <input type="email" id="email" name="email" required>
            </div>

            <div class="campo">
                <label for="senha">Senha</label>
                <input type="password" id="senha" name="senha" required>
            </div>

            <div class="campo">
                <label for="telefone">Telefone</label>
                <input type="tel" id="telefone" name="telefone" placeholder="(34) 90000-0000" required>
            </div>

            <button type="submit">Cadastrar</button>

            <p class="link-alt">Já tem conta? <a href="login.html">Faça login</a></p>
        </form>
    </main>

    <footer class="rodape">
        <p>&copy; 2026 AutoPonto - Projeto acadêmico UFU - Desenvolvimento Web I</p>
    </footer>

    <script>const CAMINHO_BASE = '';</script>
    <script src="js/storage.js"></script>
    <script src="js/validacao.js"></script>
    <script src="js/cadastro.js"></script>

</body>
</html>
