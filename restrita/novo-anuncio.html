<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novo Anúncio - AutoPonto</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

    <header class="topo">
        <div class="logo">
            <img src="../assets/logo.svg" alt="Logotipo AutoPonto">
            <h1>AutoPonto</h1>
        </div>
    </header>

    <nav class="menu">
        <ul class="lista-menu">
            <li class="item-menu"><a href="dashboard.html">Painel</a></li>
            <li class="item-menu"><a href="novo-anuncio.html">Novo Anúncio</a></li>
            <li class="item-menu"><a href="meus-anuncios.html">Meus Anúncios</a></li>
            <li class="item-menu"><a href="../index.html">Sair (logoff)</a></li>
        </ul>
    </nav>

    <main>
        <!-- Campos conforme especificado: marca, modelo, ano, cor, km, descrição,
             valor, estado, cidade e fotos (pelo menos 3) -->
        <form class="formulario" action="#" method="post" enctype="multipart/form-data" style="max-width: 600px;">
            <h2>Criar novo anúncio</h2>

            <div class="campo">
                <label for="marca">Marca</label>
                <input type="text" id="marca" name="marca" required>
            </div>

            <div class="campo">
                <label for="modelo">Modelo</label>
                <input type="text" id="modelo" name="modelo" required>
            </div>

            <div class="campo">
                <label for="ano">Ano de fabricação</label>
                <input type="number" id="ano" name="ano" min="1950" max="2026" required>
            </div>

            <div class="campo">
                <label for="cor">Cor</label>
                <input type="text" id="cor" name="cor" required>
            </div>

            <div class="campo">
                <label for="km">Quilometragem</label>
                <input type="number" id="km" name="km" min="0" required>
            </div>

            <div class="campo">
                <label for="descricao">Descrição</label>
                <textarea id="descricao" name="descricao" rows="4" required></textarea>
            </div>

            <div class="campo">
                <label for="valor">Valor (R$)</label>
                <input type="number" id="valor" name="valor" min="0" step="0.01" required>
            </div>

            <div class="campo">
                <label for="estado">Estado</label>
                <select id="estado" name="estado" required>
                    <option value="">Selecione</option>
                    <option value="MG">MG</option>
                    <option value="SP">SP</option>
                    <option value="RJ">RJ</option>
                </select>
            </div>

            <div class="campo">
                <label for="cidade">Cidade</label>
                <input type="text" id="cidade" name="cidade" required>
            </div>

            <div class="campo">
                <label for="fotos">Fotos do veículo (mínimo 3)</label>
                <input type="file" id="fotos" name="fotos[]" accept="image/*" multiple required>
            </div>

            <button type="submit">Publicar anúncio</button>
        </form>
    </main>

    <footer class="rodape">
        <p>&copy; 2026 AutoPonto - Projeto acadêmico UFU - Desenvolvimento Web I</p>
    </footer>

</body>
</html>
