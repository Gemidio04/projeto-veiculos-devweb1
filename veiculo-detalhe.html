<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalhes do Veículo - AutoPonto</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header class="topo">
        <div class="logo">
            <img src="assets/logo.svg" alt="Logotipo AutoPonto">
            <h1>AutoPonto</h1>
        </div>
    </header>

    <nav class="menu">
        <ul>
            <li><a href="index.html">Início</a></li>
            <li><a href="login.html">Login</a></li>
            <li><a href="cadastro.html">Cadastre-se</a></li>
        </ul>
    </nav>

    <main>
        <!-- Preenchido dinamicamente por js/detalhe.js, com base no ?id= da URL -->
        <section class="card-anuncio" id="detalhe-veiculo" style="max-width: 500px; margin: 0 auto 2rem;">
            <p style="padding: 1rem;">Carregando anúncio...</p>
        </section>

        <!-- Formulário de registro de interesse: nome, telefone e mensagem -->
        <form class="formulario" id="form-interesse" action="#" method="post">
            <h3>Tenho interesse neste veículo</h3>

            <div id="mensagem-envio"></div>

            <div class="campo">
                <label for="nome">Seu nome</label>
                <input type="text" id="nome" name="nome" required>
            </div>

            <div class="campo">
                <label for="telefone">Seu telefone</label>
                <input type="tel" id="telefone" name="telefone" placeholder="(34) 90000-0000" required>
            </div>

            <div class="campo">
                <label for="mensagem">Mensagem</label>
                <textarea id="mensagem" name="mensagem" rows="4" placeholder="Escreva sua mensagem de interesse..." required></textarea>
            </div>

            <button type="submit">Enviar interesse</button>
        </form>
    </main>

    <footer class="rodape">
        <p>&copy; 2026 AutoPonto - Projeto acadêmico UFU - Desenvolvimento Web I</p>
    </footer>

    <script>const CAMINHO_BASE = '';</script>
    <script src="js/storage.js"></script>
    <script src="js/validacao.js"></script>
    <script src="js/detalhe.js"></script>

</body>
</html>
